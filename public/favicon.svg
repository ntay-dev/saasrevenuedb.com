<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Radar rings -->
  <circle cx="256" cy="272" r="160" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="256" cy="272" r="110" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
  <circle cx="256" cy="272" r="60" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="2"/>
  <!-- Radar sweep -->
  <path d="M256,272 L256,112 A160,160 0 0,1 394,196 Z" fill="url(#sweep)"/>
  <!-- Crosshair lines -->
  <line x1="96" y1="272" x2="416" y2="272" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
  <line x1="256" y1="112" x2="256" y2="432" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
  <!-- Data blips -->
  <circle cx="310" cy="200" r="10" fill="white" opacity="0.9"/>
  <circle cx="200" cy="240" r="7" fill="white" opacity="0.6"/>
  <circle cx="340" cy="310" r="8" fill="white" opacity="0.7"/>
  <circle cx="180" cy="330" r="6" fill="white" opacity="0.45"/>
  <!-- Center dot -->
  <circle cx="256" cy="272" r="6" fill="white" opacity="0.9"/>
</svg>
