name: Sync TrustMRR Data

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch TrustMRR -> Bronze -> Silver -> Gold
        env:
          TRUSTMRR_API_KEY: ${{ secrets.TRUSTMRR_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/fetch-trustmrr.mjs

      - name: Upload raw JSON as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trustmrr-raw-${{ github.run_number }}
          path: trustmrr-startups.json
          retention-days: 30
          if-no-files-found: ignore
