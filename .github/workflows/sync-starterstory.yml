name: Sync StarterStory Data

on:
  schedule:
    # Weekly on Sundays at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Fetch StarterStory -> Bronze -> Silver -> Gold
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/fetch-starterstory.mjs

      - name: Upload raw JSON as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: starterstory-raw-${{ github.run_number }}
          path: data/starterstory_videos.json
          retention-days: 30
          if-no-files-found: ignore
